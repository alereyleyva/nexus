# Nginx config for serving the Nexus SPA build.
# The API is a separate service (ADR-0012); this server only serves static assets
# and falls back to index.html so client-side routes resolve on hard reload.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: unknown paths render the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the app shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
