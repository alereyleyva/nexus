name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: nexus
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-groups
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run basedpyright
      - run: uv run pytest
      - run: uv run coverage run -m pytest
      - run: uv run coverage report
      - run: git diff --check
